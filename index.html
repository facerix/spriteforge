<!doctype html>

<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Spriteforge</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Web app for working with animated images and sprite sheets"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://spriteforge.facerix.com/" />
    <meta property="og:title" content="Spriteforge" />
    <meta
      property="og:description"
      content="Web app for working with animated images and sprite sheets"
    />
    <meta property="og:url" content="https://spriteforge.facerix.com/" />
    <meta property="og:type" content="website" />
    <meta http-equiv="Content-Language" content="en" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="stylesheet" href="/main.css" type="text/css" charset="utf-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="modulepreload" href="/index.js" />

    <style>
      #canvas-container {
        display: flex;
        flex: 1;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding: 0 16px;
      }

      #sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;

        padding-left: 8px;
        border-left: 2px groove var(--accent-color);
      }

      #controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-right: 2px groove var(--accent-color);
        padding-right: 8px;

        button {
          width: 60px;
          height: 60px;
          border: 2px solid var(--accent-color);
          background-color: #fff;
          cursor: pointer;

          &.active {
            background-color: var(--accent-color);
            border-color: var(--border-subtle);

            img {
              filter: brightness(0) invert(1);
            }
          }

          &:not(.active):hover,
          &:not(.active):focus-visible {
            background-color: var(--accent-color-muted);
            border-color: var(--border-subtle);
            color: #fff;

            img {
              filter: brightness(0) invert(1);
            }
          }
        }
      }

      #menu-bar {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        border-bottom: 2px groove var(--accent-color);
        padding: 4px 8px;

        button {
          width: 32px;
          height: 32px;
          padding: 0;

          img {
            width: 90%;
            height: 90%;
          }
        }

        input[type="number"] {
          width: 40px;
          height: 32px;
          padding: 0;
          border-radius: 0;
          text-align: center;
          border: 2px solid var(--accent-color);
        }
      }

      frame-nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        justify-content: center;
        border-bottom: 1px solid;
        padding-bottom: 4px;
        margin-bottom: 4px;

        button {
          width: 32px;
          height: 32px;
          padding: 0;
          border: 2px solid var(--accent-color);
          background-color: #fff;
          cursor: pointer;
        }

        input[type="number"] {
          width: 40px;
          height: 32px;
          padding: 0;
          border-radius: 0;
          text-align: center;
          border: 2px solid var(--accent-color);
        }
      }

      #preview-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      #preview-fps {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      #preview-fps label {
        margin: 0;
      }

      #preview-fps input[type="number"] {
        width: 48px;
        height: 32px;
        padding: 0;
        border-radius: 0;
        text-align: center;
        border: 2px solid var(--accent-color);
      }
    </style>
  </head>

  <body class="u-fill-height">
    <header id="main-head">
      <img src="/logo.png" alt="App logo" />
      <h1>Spriteforge</h1>
    </header>
    <nav id="menu-bar">
      <button id="btn-new">
        <img src="/images/new.svg" alt="New Sprite" />
      </button>
      <span>|</span>
      <label for="sprite-width">W</label>
      <input
        type="number"
        id="sprite-width"
        min="1"
        max="256"
        step="1"
        value="16"
        title="Sprite width in pixels"
      />
      <label for="sprite-height">H</label>
      <input
        type="number"
        id="sprite-height"
        min="1"
        max="256"
        step="1"
        value="16"
        title="Sprite height in pixels"
      />
      <span>|</span>
      <button id="frame-copy">
        <img src="/images/copy.svg" alt="Copy Frame" />
      </button>
      <button id="frame-paste">
        <img src="/images/paste.svg" alt="Paste Frame" />
      </button>
    </nav>
    <main>
      <div id="controls">
        <button id="pencil" class="tool active">
          <img src="/images/pencil.svg" alt="Pencil" />
        </button>
        <button id="eraser" class="tool">
          <img src="/images/eraser.svg" alt="Eraser" />
        </button>
        <button id="paint-bucket" class="tool">
          <img src="/images/paint-bucket.svg" alt="Fill" />
        </button>

        <!-- <button id="fill">Fill</button>
        <button id="line">Line</button>
        <button id="rectangle">Rectangle</button>
        <button id="circle">Circle</button>
        <button id="ellipse">Ellipse</button>
        <label for="color-picker">Color</label> -->
        <input type="color" id="color-picker" value="#000000" />
      </div>
      <div id="canvas-container">
        <frame-nav>
          <label for="frame-number">Frame:</label>
          <button id="frame-previous">
            <img src="/images/prev.svg" alt="Previous Frame" />
          </button>
          <input type="number" id="frame-number" value="1" />
          /
          <span id="frame-total">1</span>
          <button id="frame-next">
            <img src="/images/next.svg" alt="Next Frame" />
          </button>
          <button id="frame-add">
            <img src="/images/plus.svg" alt="Add Frame" />
          </button>
          <button id="frame-remove">
            <img src="/images/minus.svg" alt="Remove Frame" />
          </button>
        </frame-nav>
        <sprite-editor id="sprite-editor"></sprite-editor>
      </div>

      <aside id="sidebar">
        <div id="preview-container">
          <h3>Preview</h3>
          <sprite-animation-preview
            id="sprite-preview"
          ></sprite-animation-preview>
          <div id="preview-fps">
            <label for="sprite-fps">FPS</label>
            <input
              type="number"
              id="sprite-fps"
              min="1"
              max="120"
              step="1"
              value="12"
            />
          </div>
        </div>

        <h3>History</h3>
        <history-list></history-list>
      </aside>
    </main>

    <footer id="main-foot">
      A&nbsp;<a href="/about.html">Facerix</a>&nbsp;creation
    </footer>

    <update-notification></update-notification>
    <confirmation-modal></confirmation-modal>
    <growl-toast></growl-toast>
  </body>
  <script src="/index.js" type="module"></script>
</html>
